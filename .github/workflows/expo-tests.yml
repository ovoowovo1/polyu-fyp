name: Expo Tests

on:
  push:
    branches:
      - main
    paths:
      - "frontend/expo-app/**"
      - ".github/workflows/expo-tests.yml"

  pull_request:
    branches:
      - main
    paths:
      - "frontend/expo-app/**"
      - ".github/workflows/expo-tests.yml"

jobs:
  expo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend/expo-app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/expo-app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Expo tests
        run: npm test
      - name: Run Expo lint
        run: npm run lint
      - name: Run Expo TypeScript check
        run: npx tsc --noEmit
