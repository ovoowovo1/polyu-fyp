name: Backend Tests

on:
  push:
    branches:
      - main
    paths:
      - "backend/RAG_python-quiz/**"
      - ".github/workflows/backend-tests.yml"

  pull_request:
    branches:
      - main
    paths:
      - "backend/RAG_python-quiz/**"
      - ".github/workflows/backend-tests.yml"


jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend/RAG_python-quiz
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run backend test suite with coverage gate
        run: python -m pytest
